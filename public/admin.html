<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOMARES — Admin</title>
<style>
  :root{
    --bg:#120b06;
    --panel:#1c130b;
    --border:rgba(255,255,255,0.09);
    --text:#f4ecdd;
    --text-dim:#a99b82;
    --amber:#d4a256;
    --amber-light:#f0c988;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
    padding:32px 20px;
  }
  h1{
    font-size:20px;
    font-weight:600;
    letter-spacing:0.02em;
    margin:0 0 4px;
  }
  .sub{
    color:var(--text-dim);
    font-size:13px;
    margin:0 0 28px;
  }

  #gate{
    max-width:320px;
    margin:80px auto;
    text-align:center;
  }
  #gate input{
    width:100%;
    padding:12px 14px;
    font-size:15px;
    color:var(--text);
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:10px;
    outline:none;
    margin-bottom:12px;
    font-family:inherit;
  }
  #gate button{
    width:100%;
    padding:12px;
    font-size:14px;
    font-weight:600;
    color:#1a1006;
    background:linear-gradient(135deg,var(--amber-light),var(--amber));
    border:none;
    border-radius:10px;
    cursor:pointer;
  }
  #gate .err{ color:#e07a6b; font-size:13px; margin-top:10px; min-height:16px; }

  #dashboard{ display:none; max-width:1000px; margin:0 auto; }

  .toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    flex-wrap:wrap;
    gap:10px;
  }
  .stat{
    display:inline-flex;
    gap:18px;
    font-size:13px;
    color:var(--text-dim);
  }
  .stat b{ color:var(--amber-light); font-weight:600; }

  button.refresh{
    padding:8px 14px;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.04em;
    color:var(--text);
    background:rgba(255,255,255,0.06);
    border:1px solid var(--border);
    border-radius:8px;
    cursor:pointer;
  }
  button.refresh:hover{ background:rgba(255,255,255,0.1); }

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    font-size:13px;
  }
  th,td{
    padding:10px 14px;
    text-align:left;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  th{
    color:var(--text-dim);
    font-weight:600;
    text-transform:uppercase;
    font-size:11px;
    letter-spacing:0.05em;
  }
  tr:last-child td{ border-bottom:none; }
  tr:hover td{ background:rgba(255,255,255,0.02); }

  .role{
    display:inline-block;
    padding:3px 9px;
    border-radius:999px;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.02em;
    background:rgba(212,162,86,0.14);
    color:var(--amber-light);
  }

  .empty{
    text-align:center;
    color:var(--text-dim);
    padding:40px;
    font-size:13px;
  }

  .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:#6b6355; }
  .dot.active{ background:#5fd67a; box-shadow:0 0 6px rgba(95,214,122,0.7); }

  .personRow{ cursor:pointer; }
  .personRow:hover td{ background:rgba(255,255,255,0.03); }

  .expandRow td{ padding:0; border-bottom:1px solid var(--border); }
  .interventionPanel{ padding:16px 20px; background:rgba(212,162,86,0.05); }
  .panelLabel{ font-size:12px; color:var(--text-dim); margin-bottom:10px; }
  .panelLoading{ font-size:12px; color:var(--text-dim); }
  .panelRow{ display:flex; gap:8px; flex-wrap:wrap; }
  .panelBtn{
    padding:7px 14px; font-size:13px; color:var(--text); background:rgba(255,255,255,0.06);
    border:1px solid var(--border); border-radius:8px; cursor:pointer;
  }
  .panelBtn:hover{ background:rgba(212,162,86,0.18); border-color:var(--amber); }
  .panelMsg{ font-size:12px; color:var(--amber-light); margin-top:8px; min-height:14px; }

  .panelSection{ margin-bottom:18px; }
  .panelSection:last-child{ margin-bottom:0; }
  .roleEditor{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .roleEditor select, .roleEditor input[type="text"]{
    padding:6px 9px; font-size:12px; color:var(--text); background:rgba(255,255,255,0.05);
    border:1px solid var(--border); border-radius:7px; outline:none; font-family:inherit;
  }
  .roleEditor select option{ color:#1a1006; }
  .roleEditor button{
    padding:6px 12px; font-size:12px; font-weight:600; border-radius:7px; cursor:pointer; border:none; font-family:inherit;
  }
  .roleEditor .saveRole{ color:#1a1006; background:linear-gradient(135deg,var(--amber-light),var(--amber)); }

  .rowDelete{
    width:24px; height:24px; border-radius:50%; border:1px solid var(--border); background:rgba(255,255,255,0.04);
    color:#e07a6b; cursor:pointer; font-size:14px; line-height:1;
  }
  .rowDelete:hover{ background:rgba(224,122,107,0.15); border-color:#e07a6b; }
</style>
</head>
<body>

<div id="gate">
  <h1>SOMARES Admin</h1>
  <p class="sub">Sign in to view registrations.</p>
  <input type="text" id="userInput" placeholder="Username" autocomplete="username">
  <input type="password" id="keyInput" placeholder="Password" autocomplete="current-password">
  <button id="unlockBtn">Sign In</button>
  <div class="err" id="gateErr"></div>
</div>

<div id="dashboard">
  <h1>Registrations</h1>
  <p class="sub">Live view of everyone who has registered, across all venues. Roles are never shown to participants — this view is for the team only.</p>

  <div class="toolbar">
    <div class="stat" id="stats"></div>
    <button class="refresh" id="refreshBtn">Refresh</button>
  </div>

  <div id="tableWrap"></div>
</div>

<script>
(function(){
  "use strict";

  var gate = document.getElementById('gate');
  var dashboard = document.getElementById('dashboard');
  var userInput = document.getElementById('userInput');
  var keyInput = document.getElementById('keyInput');
  var unlockBtn = document.getElementById('unlockBtn');
  var gateErr = document.getElementById('gateErr');
  var tableWrap = document.getElementById('tableWrap');
  var stats = document.getElementById('stats');
  var refreshBtn = document.getElementById('refreshBtn');

  var storedKey = sessionStorage.getItem('somares_admin_key');
  var lastData = null;
  var expandedCode = null;
  var assetsByRole = {};

  function venueLabel(v){
    return {
      'yildiz-museum': 'Yıldız Museum',
      'catalhoyuk': 'Çatalhöyük',
      'ciurlionis': 'Čiurlionis Museum',
      'fondazione-ago': 'Fondazione AGO'
    }[v] || v;
  }

  function render(data){
    lastData = data;
    var rows = data.registrations;

    var byVenue = {};
    rows.forEach(function(r){ byVenue[r.venue] = (byVenue[r.venue]||0) + 1; });
    var statHtml = '<span>Total <b>' + rows.length + '</b></span>';
    Object.keys(byVenue).forEach(function(v){
      statHtml += '<span>' + venueLabel(v) + ' <b>' + byVenue[v] + '</b></span>';
    });
    stats.innerHTML = statHtml;

    if (!rows.length){
      tableWrap.innerHTML = '<div class="empty">No registrations yet.</div>';
      return;
    }

    var html = '<table><thead><tr>' +
      '<th></th><th>ID</th><th>Name</th><th>Venue</th><th>Role</th><th>Group</th><th>Time</th><th></th>' +
      '</tr></thead><tbody>';

    rows.forEach(function(r){
      var time = new Date(r.created_at).toLocaleString();
      html += '<tr class="personRow" data-code="' + r.participant_code + '" data-role="' + r.role + '" data-venue="' + r.venue + '" data-name="' + escapeHtml(r.first_name + ' ' + r.last_name) + '">' +
        '<td><span class="dot' + (r.active ? ' active' : '') + '"></span></td>' +
        '<td>' + r.participant_code + '</td>' +
        '<td>' + escapeHtml(r.first_name + ' ' + r.last_name) + '</td>' +
        '<td>' + venueLabel(r.venue) + '</td>' +
        '<td><span class="role">' + r.role + '</span></td>' +
        '<td>#' + r.group_index + ' · pos ' + r.position_in_group + '</td>' +
        '<td>' + time + '</td>' +
        '<td><button class="rowDelete" data-code="' + r.participant_code + '" data-name="' + escapeHtml(r.first_name + ' ' + r.last_name) + '" title="Delete">×</button></td>' +
        '</tr>';
      if (expandedCode === r.participant_code){
        html += '<tr class="expandRow"><td colspan="8"><div class="interventionPanel" id="interventionPanel"></div></td></tr>';
      }
    });
    html += '</tbody></table>';
    tableWrap.innerHTML = html;

    Array.prototype.forEach.call(tableWrap.querySelectorAll('.personRow'), function(tr){
      tr.addEventListener('click', function(){
        var code = tr.dataset.code;
        expandedCode = (expandedCode === code) ? null : code;
        render(lastData);
        if (expandedCode) loadIntervention(tr.dataset.code, tr.dataset.role, tr.dataset.venue, tr.dataset.name);
      });
    });

    Array.prototype.forEach.call(tableWrap.querySelectorAll('.rowDelete'), function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        deleteRegistration(btn.dataset.code, btn.dataset.name);
      });
    });
  }

  function deleteRegistration(code, name){
    if (!confirm('Delete ' + name + '\'s registration? This can\'t be undone.')) return;
    fetch('/api/admin/delete-registration', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': sessionStorage.getItem('somares_admin_key') },
      body: JSON.stringify({ participantCode: code })
    }).then(function(){
      if (expandedCode === code) expandedCode = null;
      return load(sessionStorage.getItem('somares_admin_key'));
    }).then(render).catch(function(){});
  }

  var ROLES = ['merchant','traveler','translator','innkeeper','guard','storyteller','pilgrim','caravan-guide','spice-trader','messenger'];

  function loadIntervention(code, role, venue, name){
    var panel = document.getElementById('interventionPanel');
    if (!panel) return;

    var roleSection = document.createElement('div');
    roleSection.className = 'panelSection';
    roleSection.innerHTML = '<div class="panelLabel">Change ' + escapeHtml(name) + '&rsquo;s role</div>';
    var editor = document.createElement('div');
    editor.className = 'roleEditor';
    var sel = document.createElement('select');
    ROLES.forEach(function(r){ var o = document.createElement('option'); o.value = r; o.textContent = r; if (r === role) o.selected = true; sel.appendChild(o); });
    var customOpt = document.createElement('option');
    customOpt.value = '__custom__';
    customOpt.textContent = 'Custom…';
    if (!ROLES.includes(role)) customOpt.selected = true;
    sel.appendChild(customOpt);
    var customInput = document.createElement('input');
    customInput.type = 'text';
    customInput.placeholder = 'custom role name';
    customInput.style.display = ROLES.includes(role) ? 'none' : '';
    if (!ROLES.includes(role)) customInput.value = role;
    sel.addEventListener('change', function(){ customInput.style.display = sel.value === '__custom__' ? '' : 'none'; });
    var saveBtn = document.createElement('button');
    saveBtn.className = 'saveRole';
    saveBtn.textContent = 'Save';
    var roleMsg = document.createElement('div');
    roleMsg.className = 'panelMsg';
    saveBtn.addEventListener('click', function(){
      var newRole = sel.value === '__custom__' ? customInput.value.trim() : sel.value;
      if (!newRole) return;
      fetch('/api/admin/update-role', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': sessionStorage.getItem('somares_admin_key') },
        body: JSON.stringify({ participantCode: code, role: newRole })
      }).then(function(r){
        roleMsg.textContent = r.ok ? 'Saved.' : 'Failed to save.';
        assetsByRole = {};
        return load(sessionStorage.getItem('somares_admin_key'));
      }).then(function(data){ lastData = data; }).catch(function(){ roleMsg.textContent = 'Failed to save.'; });
    });
    editor.appendChild(sel);
    editor.appendChild(customInput);
    editor.appendChild(saveBtn);
    roleSection.appendChild(editor);
    roleSection.appendChild(roleMsg);

    var whisperSection = document.createElement('div');
    whisperSection.className = 'panelSection';
    whisperSection.innerHTML = '<div class="panelLoading">Loading ' + escapeHtml(name) + '&rsquo;s whispers…</div>';

    panel.innerHTML = '';
    panel.appendChild(roleSection);
    panel.appendChild(whisperSection);

    var fetchAssets = assetsByRole[role]
      ? Promise.resolve(assetsByRole[role])
      : fetch('/api/admin/audio-assets', { headers: { 'x-admin-key': sessionStorage.getItem('somares_admin_key') } })
          .then(function(r){ return r.json(); })
          .then(function(data){
            var whispers = data.assets.filter(function(a){ return a.layer === 'whisper' && a.role === role; });
            assetsByRole[role] = whispers;
            return whispers;
          });

    fetchAssets.then(function(whispers){
      var html = '<div class="panelLabel">Send a whisper to ' + escapeHtml(name) + ' only</div><div class="panelRow">';
      if (!whispers.length) html += '<span class="panelLoading">No whispers uploaded for this role.</span>';
      whispers.forEach(function(w, i){
        html += '<button class="panelBtn" data-url="' + encodeURI(w.url) + '">' + (i + 1) + '</button>';
      });
      html += '</div><div class="panelMsg" id="panelMsg"></div>';
      whisperSection.innerHTML = html;

      Array.prototype.forEach.call(whisperSection.querySelectorAll('.panelBtn'), function(btn){
        btn.addEventListener('click', function(){
          fetch('/api/admin/trigger', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-key': sessionStorage.getItem('somares_admin_key') },
            body: JSON.stringify({ venue: venue, assetUrl: decodeURI(btn.dataset.url), targetParticipantCode: code })
          }).then(function(r){
            document.getElementById('panelMsg').textContent = r.ok ? 'Sent.' : 'Failed to send.';
          }).catch(function(){
            document.getElementById('panelMsg').textContent = 'Failed to send.';
          });
        });
      });
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  function load(key){
    return fetch('/api/admin/registrations', { headers: { 'x-admin-key': key } })
      .then(function(r){
        if (r.status === 401) throw new Error('unauthorized');
        if (!r.ok) throw new Error('failed');
        return r.json();
      });
  }

  var autoRefreshTimer = null;
  function startAutoRefresh(){
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(function(){
      var key = sessionStorage.getItem('somares_admin_key');
      if (!key) return;
      load(key).then(render).catch(function(){});
    }, 5000);
  }

  function unlock(username, key){
    gateErr.textContent = '';
    if (username !== 'admin'){
      gateErr.textContent = 'Invalid username or password.';
      return;
    }
    unlockBtn.disabled = true;
    load(key)
      .then(function(data){
        sessionStorage.setItem('somares_admin_key', key);
        gate.style.display = 'none';
        dashboard.style.display = 'block';
        render(data);
        startAutoRefresh();
      })
      .catch(function(){
        gateErr.textContent = 'Invalid username or password.';
        unlockBtn.disabled = false;
      });
  }

  function attemptUnlock(){ unlock(userInput.value.trim(), keyInput.value); }
  unlockBtn.addEventListener('click', attemptUnlock);
  userInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') attemptUnlock(); });
  keyInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') attemptUnlock(); });

  refreshBtn.addEventListener('click', function(){
    var key = sessionStorage.getItem('somares_admin_key');
    if (!key) return;
    load(key).then(render).catch(function(){});
  });

  if (storedKey){
    load(storedKey).then(function(data){
      gate.style.display = 'none';
      dashboard.style.display = 'block';
      render(data);
      startAutoRefresh();
    }).catch(function(){
      sessionStorage.removeItem('somares_admin_key');
    });
  }
})();
</script>

</body>
</html>
