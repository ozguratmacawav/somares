<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOMARES — Conductor</title>
<style>
  :root{
    --bg:#120b06;
    --panel:#1c130b;
    --border:rgba(255,255,255,0.09);
    --text:#f4ecdd;
    --text-dim:#a99b82;
    --amber:#d4a256;
    --amber-light:#f0c988;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;
    padding:32px 20px 80px;
  }
  h1{ font-size:20px; font-weight:600; margin:0 0 4px; }
  h2{ font-size:14px; font-weight:600; color:var(--amber-light); text-transform:uppercase; letter-spacing:0.06em; margin:0 0 14px; }
  .sub{ color:var(--text-dim); font-size:13px; margin:0 0 24px; }

  #gate{ max-width:320px; margin:80px auto; text-align:center; }
  #gate input{
    width:100%; padding:12px 14px; font-size:15px; color:var(--text);
    background:rgba(255,255,255,0.05); border:1px solid var(--border);
    border-radius:10px; outline:none; margin-bottom:12px; font-family:inherit;
  }
  #gate button{
    width:100%; padding:12px; font-size:14px; font-weight:600; color:#1a1006;
    background:linear-gradient(135deg,var(--amber-light),var(--amber));
    border:none; border-radius:10px; cursor:pointer;
  }
  #gate .err{ color:#e07a6b; font-size:13px; margin-top:10px; min-height:16px; }

  #dashboard{ display:none; max-width:720px; margin:0 auto; }

  select{
    width:100%; padding:10px 12px; font-size:14px; color:var(--text);
    background:rgba(255,255,255,0.05); border:1px solid var(--border);
    border-radius:8px; outline:none; margin-bottom:18px; font-family:inherit;
  }
  select option{ color:#1a1006; }

  /* Tabs */
  .tabBar{
    display:inline-flex; gap:2px; padding:3px; margin-bottom:20px;
    background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:11px;
  }
  .tabBtn{
    padding:8px 18px; font-size:13px; font-weight:600; letter-spacing:0.02em;
    color:var(--text-dim); background:transparent; border:none; border-radius:8px; cursor:pointer;
    font-family:inherit; transition:background 0.15s ease, color 0.15s ease;
  }
  .tabBtn:hover{ color:var(--text); }
  .tabBtn.active{ background:linear-gradient(135deg,var(--amber-light),var(--amber)); color:#1a1006; }

  .panel{
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:20px; margin-bottom:20px;
  }

  .moodRow{ display:flex; flex-wrap:wrap; gap:8px; }
  .moodBtn{
    padding:10px 16px; font-size:13px; font-weight:600; letter-spacing:0.02em;
    color:var(--text); background:rgba(255,255,255,0.06); border:1px solid var(--border);
    border-radius:999px; cursor:pointer; transition:background 0.2s ease, color 0.2s ease;
  }
  .moodBtn:hover{ background:rgba(255,255,255,0.1); }
  .moodBtn.active{ background:linear-gradient(135deg,var(--amber-light),var(--amber)); color:#1a1006; border-color:transparent; }

  .whisperRow{ display:flex; flex-wrap:wrap; gap:8px; padding:10px 0 4px; }
  .whisperBtn{
    padding:8px 14px; font-size:13px; color:var(--text); background:rgba(255,255,255,0.05);
    border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:background 0.15s ease;
  }
  .whisperBtn:hover{ background:rgba(212,162,86,0.15); border-color:var(--amber); }
  .whisperBtn:active{ transform:scale(0.97); }

  .stingRow{ display:flex; flex-wrap:wrap; gap:8px; }
  .stingBtn{
    padding:10px 16px; font-size:13px; font-weight:600; color:#1a1006;
    background:linear-gradient(135deg,#e07a6b,#b8493a); border:none; border-radius:999px; cursor:pointer;
  }

  .scopeNote{ text-transform:none; letter-spacing:0; color:var(--text-dim); font-weight:400; font-size:12px; }

  .targetBar{
    font-size:13px; color:var(--text-dim); margin-bottom:14px;
    padding:8px 12px; background:rgba(255,255,255,0.04); border-radius:8px;
  }
  .targetBar b{ color:var(--amber-light); }
  .targetBar button{
    margin-left:10px; padding:3px 10px; font-size:11px; color:var(--text);
    background:rgba(255,255,255,0.08); border:1px solid var(--border); border-radius:999px; cursor:pointer;
  }

  .presenceRow{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px;
    cursor:pointer; transition:background 0.15s ease;
  }
  .presenceRow:hover{ background:rgba(255,255,255,0.05); }
  .presenceRow.focused{ background:rgba(212,162,86,0.15); }
  .dot{ width:9px; height:9px; border-radius:50%; background:#6b6355; flex-shrink:0; }
  .dot.active{ background:#5fd67a; box-shadow:0 0 6px rgba(95,214,122,0.7); }
  .presenceName{ font-size:13px; color:var(--text); }
  .presenceRole{ font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; margin-left:auto; }
  .presenceEmpty{ color:var(--text-dim); font-size:13px; padding:8px 0; }

  .uploadForm{
    display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:6px;
  }
  .uploadForm select, .uploadForm input[type="text"]{
    padding:8px 10px; font-size:13px; color:var(--text); background:rgba(255,255,255,0.05);
    border:1px solid var(--border); border-radius:8px; outline:none; font-family:inherit; margin-bottom:0;
  }
  .uploadForm select{ width:auto; }
  .uploadForm select option{ color:#1a1006; }
  .uploadForm input[type="file"]{ font-size:12px; color:var(--text-dim); max-width:220px; }
  .uploadForm button{
    padding:8px 16px; font-size:13px; font-weight:600; color:#1a1006;
    background:linear-gradient(135deg,var(--amber-light),var(--amber)); border:none; border-radius:8px; cursor:pointer;
  }
  .uploadForm button:disabled{ opacity:0.5; cursor:default; }
  .panelMsg{ font-size:12px; color:var(--amber-light); margin:6px 0 4px; min-height:14px; }

  /* Folders — reused for both the whisper-trigger accordion and the library tree */
  .folder{ border-bottom:1px solid var(--border); }
  .folder:last-child{ border-bottom:none; }
  .folder.nested{ border-bottom:none; padding-left:18px; }
  .folderHeader{
    display:flex; align-items:center; gap:8px; padding:10px 2px; cursor:pointer; user-select:none;
  }
  .folderHeader:hover .folderTitle{ color:var(--amber-light); }
  .chevron{ font-size:10px; color:var(--text-dim); width:10px; flex-shrink:0; }
  .folderTitle{ font-size:13px; color:var(--text); text-transform:capitalize; transition:color 0.15s ease; }
  .folderCount{
    font-size:11px; color:var(--text-dim); background:rgba(255,255,255,0.06);
    padding:1px 8px; border-radius:999px; margin-left:auto;
  }
  .folderBody{ display:none; padding-left:18px; }
  .folderBody.open{ display:block; }

  .libItem{
    display:flex; align-items:center; gap:10px; padding:7px 8px; font-size:13px;
    border-bottom:1px solid var(--border);
  }
  .libItem:last-child{ border-bottom:none; }
  .libItemLabel{ flex:1; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .libDelete{
    width:22px; height:22px; border-radius:50%; border:1px solid var(--border); background:rgba(255,255,255,0.04);
    color:#e07a6b; cursor:pointer; font-size:13px; line-height:1; flex-shrink:0;
  }
  .libDelete:hover{ background:rgba(224,122,107,0.15); border-color:#e07a6b; }
  .libEmpty{ color:var(--text-dim); font-size:12px; padding:6px 2px; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:rgba(20,14,8,0.95); border:1px solid var(--border); color:var(--text);
    padding:10px 18px; border-radius:10px; font-size:13px; opacity:0;
    transition:opacity 0.25s ease, transform 0.25s ease; pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="gate">
  <h1>SOMARES Conductor</h1>
  <p class="sub">Sign in to control the live experience.</p>
  <input type="text" id="userInput" placeholder="Username" autocomplete="username">
  <input type="password" id="keyInput" placeholder="Password" autocomplete="current-password">
  <button id="unlockBtn">Sign In</button>
  <div class="err" id="gateErr"></div>
</div>

<div id="dashboard">
  <h1>Conductor</h1>
  <p class="sub">Live control for one venue. Every connected phone there checks in every few seconds.</p>

  <select id="venueSelect">
    <option value="yildiz-museum">Yıldız Museum</option>
    <option value="catalhoyuk">Çatalhöyük</option>
    <option value="ciurlionis">Čiurlionis Museum</option>
    <option value="fondazione-ago">Fondazione AGO</option>
  </select>

  <div class="tabBar">
    <button class="tabBtn active" data-tab="live">Live Control</button>
    <button class="tabBtn" data-tab="library">Audio Library</button>
  </div>

  <div class="tabPanel" id="tab-live">
    <div class="panel">
      <h2>Who's here</h2>
      <div class="targetBar" id="targetBar">Targeting: <b>everyone</b> at this venue</div>
      <div id="presenceList"></div>
    </div>

    <div class="panel">
      <h2>Mood <span class="scopeNote">(always the whole venue)</span></h2>
      <div class="moodRow" id="moodRow"></div>
    </div>

    <div class="panel">
      <h2>Sting</h2>
      <div class="stingRow" id="stingRow"></div>
    </div>

    <div class="panel">
      <h2>Trigger a whisper</h2>
      <div id="whisperGroups"></div>
    </div>
  </div>

  <div class="tabPanel" id="tab-library" style="display:none;">
    <div class="panel">
      <h2>Upload</h2>
      <div class="uploadForm">
        <select id="uploadLayer">
          <option value="whisper">Whisper (per role)</option>
          <option value="mood">Mood (shared)</option>
          <option value="ambience">Ambience (per venue)</option>
        </select>
        <select id="uploadRole"></select>
        <select id="uploadVenue" style="display:none;"></select>
        <input type="text" id="uploadMoodKey" placeholder="mood key (e.g. tense)" style="display:none;">
        <input type="file" id="uploadFile" accept="audio/*">
        <button id="uploadBtn">Upload</button>
      </div>
      <div class="panelMsg" id="uploadMsg"></div>
    </div>

    <div class="panel">
      <h2>Library</h2>
      <div id="libraryList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var gate = document.getElementById('gate');
  var dashboard = document.getElementById('dashboard');
  var userInput = document.getElementById('userInput');
  var keyInput = document.getElementById('keyInput');
  var unlockBtn = document.getElementById('unlockBtn');
  var gateErr = document.getElementById('gateErr');
  var venueSelect = document.getElementById('venueSelect');
  var moodRow = document.getElementById('moodRow');
  var stingRow = document.getElementById('stingRow');
  var whisperGroups = document.getElementById('whisperGroups');
  var presenceList = document.getElementById('presenceList');
  var targetBar = document.getElementById('targetBar');
  var toast = document.getElementById('toast');
  var uploadLayer = document.getElementById('uploadLayer');
  var uploadRole = document.getElementById('uploadRole');
  var uploadVenue = document.getElementById('uploadVenue');
  var uploadMoodKey = document.getElementById('uploadMoodKey');
  var uploadFile = document.getElementById('uploadFile');
  var uploadBtn = document.getElementById('uploadBtn');
  var uploadMsg = document.getElementById('uploadMsg');
  var libraryList = document.getElementById('libraryList');

  var adminKey = null;
  var assets = [];
  var currentMood = null;
  var people = [];
  var focused = null; // { code, name } or null = targeting everyone
  var presenceTimer = null;
  var expandedFolders = {}; // key -> bool, persists across re-renders

  var ROLES = ['merchant','traveler','translator','innkeeper','guard','storyteller','pilgrim','caravan-guide','spice-trader','messenger'];
  var VENUES = [['yildiz-museum','Yıldız Museum'],['catalhoyuk','Çatalhöyük'],['ciurlionis','Čiurlionis Museum'],['fondazione-ago','Fondazione AGO']];
  ROLES.forEach(function(r){ var o = document.createElement('option'); o.value = r; o.textContent = r; uploadRole.appendChild(o); });
  VENUES.forEach(function(v){ var o = document.createElement('option'); o.value = v[0]; o.textContent = v[1]; uploadVenue.appendChild(o); });

  function venueLabel(v){
    var found = VENUES.find(function(x){ return x[0] === v; });
    return found ? found[1] : v;
  }

  function updateUploadFields(){
    var layer = uploadLayer.value;
    uploadRole.style.display = layer === 'whisper' ? '' : 'none';
    uploadVenue.style.display = layer === 'ambience' ? '' : 'none';
    uploadMoodKey.style.display = layer === 'mood' ? '' : 'none';
  }
  uploadLayer.addEventListener('change', updateUploadFields);
  updateUploadFields();

  /* ---------- Tabs ---------- */
  var tabBtns = document.querySelectorAll('.tabBtn');
  Array.prototype.forEach.call(tabBtns, function(btn){
    btn.addEventListener('click', function(){
      Array.prototype.forEach.call(tabBtns, function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-live').style.display = btn.dataset.tab === 'live' ? '' : 'none';
      document.getElementById('tab-library').style.display = btn.dataset.tab === 'library' ? '' : 'none';
    });
  });

  /* ---------- Small folder/accordion component, reused for whisper
     triggers and the library tree ---------- */
  function groupBy(list, key){
    var out = {};
    list.forEach(function(item){ var k = item[key] || '—'; out[k] = out[k] || []; out[k].push(item); });
    return out;
  }

  function folderEl(key, title, count, buildBody, opts){
    opts = opts || {};
    var isOpen = !!expandedFolders[key];
    var folder = document.createElement('div');
    folder.className = 'folder' + (opts.nested ? ' nested' : '');

    var header = document.createElement('div');
    header.className = 'folderHeader';
    var chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = isOpen ? '▾' : '▸';
    var titleEl = document.createElement('span');
    titleEl.className = 'folderTitle';
    titleEl.textContent = title;
    header.appendChild(chevron);
    header.appendChild(titleEl);
    if (count != null){
      var countEl = document.createElement('span');
      countEl.className = 'folderCount';
      countEl.textContent = count;
      header.appendChild(countEl);
    }

    var body = document.createElement('div');
    body.className = 'folderBody' + (isOpen ? ' open' : '');
    buildBody(body);

    header.addEventListener('click', function(){
      expandedFolders[key] = !expandedFolders[key];
      body.classList.toggle('open');
      chevron.textContent = expandedFolders[key] ? '▾' : '▸';
    });

    folder.appendChild(header);
    folder.appendChild(body);
    return folder;
  }

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 1800);
  }

  function api(path, opts){
    opts = opts || {};
    opts.headers = Object.assign({ 'x-admin-key': adminKey }, opts.headers || {});
    return fetch(path, opts).then(function(r){
      return r.json().catch(function(){ return {}; }).then(function(data){
        if (!r.ok) throw new Error(data.error || 'request failed');
        return data;
      });
    });
  }

  function loadAssets(){
    return api('/api/admin/audio-assets').then(function(data){ assets = data.assets; });
  }

  function renderMoods(){
    var moods = assets.filter(function(a){ return a.layer === 'mood'; });
    var seen = {};
    moodRow.innerHTML = '';
    moods.forEach(function(m){
      if (seen[m.mood_key]) return;
      seen[m.mood_key] = true;
      var btn = document.createElement('button');
      btn.className = 'moodBtn';
      btn.textContent = m.mood_key;
      btn.dataset.mood = m.mood_key;
      btn.addEventListener('click', function(){ setMood(m.mood_key); });
      moodRow.appendChild(btn);
    });
    highlightMood();
  }

  function highlightMood(){
    Array.prototype.forEach.call(moodRow.children, function(btn){
      btn.classList.toggle('active', btn.dataset.mood === currentMood);
    });
  }

  function setMood(moodKey){
    // Mood is always venue-wide, regardless of who's focused.
    api('/api/admin/set-mood', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ venue: venueSelect.value, moodKey: moodKey })
    }).then(function(){
      currentMood = moodKey;
      highlightMood();
      showToast('Mood set to "' + moodKey + '"');
    }).catch(function(){ showToast('Failed to set mood'); });
  }

  function renderPresence(){
    api('/api/admin/presence?venue=' + encodeURIComponent(venueSelect.value)).then(function(data){
      people = data.people;
      if (focused && !people.some(function(p){ return p.participantCode === focused.code; })){
        setFocus(null);
      }
      if (!people.length){
        presenceList.innerHTML = '<div class="presenceEmpty">No one has registered here yet.</div>';
        return;
      }
      presenceList.innerHTML = '';
      people.forEach(function(p){
        var row = document.createElement('div');
        row.className = 'presenceRow' + (focused && focused.code === p.participantCode ? ' focused' : '');
        var dot = document.createElement('div');
        dot.className = 'dot' + (p.active ? ' active' : '');
        var name = document.createElement('div');
        name.className = 'presenceName';
        name.textContent = p.firstName + ' ' + p.lastName + ' · #' + p.participantCode;
        var role = document.createElement('div');
        role.className = 'presenceRole';
        role.textContent = p.role;
        row.appendChild(dot);
        row.appendChild(name);
        row.appendChild(role);
        row.addEventListener('click', function(){
          setFocus(focused && focused.code === p.participantCode ? null : { code: p.participantCode, name: p.firstName + ' ' + p.lastName, role: p.role });
        });
        presenceList.appendChild(row);
      });
    }).catch(function(){});
  }

  function setFocus(f){
    focused = f;
    targetBar.innerHTML = focused
      ? 'Targeting: <b>' + focused.name + '</b> (' + focused.role + ') only <button id="clearFocusBtn">Clear</button>'
      : 'Targeting: <b>everyone</b> at this venue';
    var clearBtn = document.getElementById('clearFocusBtn');
    if (clearBtn) clearBtn.addEventListener('click', function(){ setFocus(null); });
    renderPresence();
  }

  function renderStings(){
    // Any mood-layer asset can double as an instant sting for everyone.
    var moods = assets.filter(function(a){ return a.layer === 'mood'; });
    var seen = {};
    stingRow.innerHTML = '';
    moods.forEach(function(m){
      if (seen[m.mood_key]) return;
      seen[m.mood_key] = true;
      var btn = document.createElement('button');
      btn.className = 'stingBtn';
      btn.textContent = m.mood_key;
      btn.addEventListener('click', function(){ sendTrigger(null, m.url, m.mood_key); });
      stingRow.appendChild(btn);
    });
  }

  function renderWhisperTriggers(){
    var whispers = assets.filter(function(a){ return a.layer === 'whisper'; });
    var byRole = groupBy(whispers, 'role');
    whisperGroups.innerHTML = '';
    if (!whispers.length){
      whisperGroups.innerHTML = '<div class="libEmpty">No whispers uploaded yet.</div>';
      return;
    }
    Object.keys(byRole).sort().forEach(function(role){
      whisperGroups.appendChild(folderEl('trig-' + role, role, byRole[role].length, function(body){
        var row = document.createElement('div');
        row.className = 'whisperRow';
        byRole[role].forEach(function(w, i){
          var btn = document.createElement('button');
          btn.className = 'whisperBtn';
          btn.textContent = (i + 1);
          btn.addEventListener('click', function(e){ e.stopPropagation(); sendTrigger(role, w.url, role + ' #' + (i + 1)); });
          row.appendChild(btn);
        });
        body.appendChild(row);
      }));
    });
  }

  function fileRow(asset){
    var row = document.createElement('div');
    row.className = 'libItem';
    var label = document.createElement('div');
    label.className = 'libItemLabel';
    label.textContent = asset.label;
    var del = document.createElement('button');
    del.className = 'libDelete';
    del.textContent = '×';
    del.title = 'Delete';
    del.addEventListener('click', function(e){ e.stopPropagation(); deleteAsset(asset.id); });
    row.appendChild(label);
    row.appendChild(del);
    return row;
  }

  function renderLibrary(){
    libraryList.innerHTML = '';

    var whispers = assets.filter(function(a){ return a.layer === 'whisper'; });
    var byRole = groupBy(whispers, 'role');
    libraryList.appendChild(folderEl('lib-whisper', 'Whispers', whispers.length, function(body){
      Object.keys(byRole).sort().forEach(function(role){
        body.appendChild(folderEl('lib-whisper-' + role, role, byRole[role].length, function(roleBody){
          byRole[role].forEach(function(a){ roleBody.appendChild(fileRow(a)); });
        }, { nested: true }));
      });
    }));

    var moods = assets.filter(function(a){ return a.layer === 'mood'; });
    libraryList.appendChild(folderEl('lib-mood', 'Moods', moods.length, function(body){
      if (!moods.length){ body.appendChild(emptyRow()); return; }
      moods.forEach(function(a){ body.appendChild(fileRow(a)); });
    }));

    var ambiences = assets.filter(function(a){ return a.layer === 'ambience'; });
    var byVenue = groupBy(ambiences, 'venue');
    libraryList.appendChild(folderEl('lib-ambience', 'Ambiences', ambiences.length, function(body){
      Object.keys(byVenue).sort().forEach(function(venue){
        body.appendChild(folderEl('lib-ambience-' + venue, venueLabel(venue), byVenue[venue].length, function(vBody){
          byVenue[venue].forEach(function(a){ vBody.appendChild(fileRow(a)); });
        }, { nested: true }));
      });
    }));
  }

  function emptyRow(){
    var d = document.createElement('div');
    d.className = 'libEmpty';
    d.textContent = 'Nothing here yet.';
    return d;
  }

  function deleteAsset(id){
    if (!confirm('Delete this clip? This can\'t be undone.')) return;
    api('/api/admin/delete-asset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id })
    }).then(function(){
      showToast('Deleted');
      return loadAssets();
    }).then(function(){
      renderMoods(); renderStings(); renderWhisperTriggers(); renderLibrary();
    }).catch(function(){ showToast('Failed to delete'); });
  }

  function fileToBase64(file){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){ resolve(reader.result.split(',')[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  uploadBtn.addEventListener('click', function(){
    var layer = uploadLayer.value;
    var file = uploadFile.files[0];
    if (!file){ uploadMsg.textContent = 'Choose a file first.'; return; }

    uploadBtn.disabled = true;
    uploadMsg.textContent = 'Uploading…';

    fileToBase64(file).then(function(b64){
      var body = { layer: layer, label: file.name, dataBase64: b64 };
      if (layer === 'whisper') body.role = uploadRole.value;
      if (layer === 'ambience') body.venue = uploadVenue.value;
      if (layer === 'mood') body.moodKey = uploadMoodKey.value.trim();

      return api('/api/admin/upload-asset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }).then(function(){
      uploadMsg.textContent = 'Uploaded.';
      uploadFile.value = '';
      uploadMoodKey.value = '';
      return loadAssets();
    }).then(function(){
      renderMoods(); renderStings(); renderWhisperTriggers(); renderLibrary();
    }).catch(function(err){
      uploadMsg.textContent = (err && err.message) || 'Upload failed.';
    }).finally(function(){
      uploadBtn.disabled = false;
    });
  });

  function sendTrigger(targetRole, assetUrl, label){
    var body = { venue: venueSelect.value, targetRole: targetRole, assetUrl: assetUrl };
    if (focused) body.targetParticipantCode = focused.code;
    api('/api/admin/trigger', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function(){
      showToast('Sent: ' + label + (focused ? ' → ' + focused.name : ''));
    }).catch(function(){ showToast('Failed to send trigger'); });
  }

  function refreshVenueState(){
    fetch('/api/venue-state?venue=' + encodeURIComponent(venueSelect.value) + '&role=merchant&since=999999999')
      .then(function(r){ return r.json(); })
      .then(function(data){ currentMood = data.mood; highlightMood(); })
      .catch(function(){});
  }

  function renderAll(){
    renderMoods();
    renderStings();
    renderWhisperTriggers();
    renderLibrary();
    refreshVenueState();
    setFocus(null);
    if (presenceTimer) clearInterval(presenceTimer);
    presenceTimer = setInterval(renderPresence, 5000);
  }

  venueSelect.addEventListener('change', renderAll);

  function unlock(username, key){
    gateErr.textContent = '';
    if (username !== 'admin'){
      gateErr.textContent = 'Invalid username or password.';
      return;
    }
    unlockBtn.disabled = true;
    adminKey = key;
    loadAssets()
      .then(function(){
        sessionStorage.setItem('somares_admin_key', key);
        gate.style.display = 'none';
        dashboard.style.display = 'block';
        renderAll();
      })
      .catch(function(){
        gateErr.textContent = 'Invalid username or password.';
        unlockBtn.disabled = false;
        adminKey = null;
      });
  }

  function attemptUnlock(){ unlock(userInput.value.trim(), keyInput.value); }
  unlockBtn.addEventListener('click', attemptUnlock);
  userInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') attemptUnlock(); });
  keyInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') attemptUnlock(); });

  var storedKey = sessionStorage.getItem('somares_admin_key');
  if (storedKey) unlock('admin', storedKey);
})();
</script>

</body>
</html>
